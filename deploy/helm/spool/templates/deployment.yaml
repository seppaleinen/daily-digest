apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spool.name" . }}
  labels:
    {{- include "spool.labels" . | nindent 4 }}
spec:
  {{- if gt (int .Values.replicaCount) 1 }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "spool.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "spool.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "spool.image" . | quote }}
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: SPOOL_CONFIG_PATH
              value: {{ .Values.config.spoolConfigPath | quote }}
            - name: INFERENCE_PROVIDER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: INFERENCE_PROVIDER_URL
            - name: WHISPER_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: WHISPER_MODEL
            - name: SUMMARIZATION_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: SUMMARIZATION_MODEL
            - name: DIGEST_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: DIGEST_API_URL
            - name: YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spool.fullname" . }}-secrets
                  key: YOUTUBE_API_KEY
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: {{ .Values.config.spoolConfigDir }}
              readOnly: true
            - name: spool-tmp
              mountPath: /tmp/spool
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "spool.fullname" . }}-config
        - name: spool-tmp
          emptyDir:
            medium: Memory
