apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reader.fullname" . }}
  labels:
    {{- include "reader.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reader.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reader.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: reader
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
