image:
  repository: reader-image
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

ingress:
  host: reader.daily-digest.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
