apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "api.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: drizzle-migrate
          image: "{{ .Values.image.repository }}-migrate:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["npx", "drizzle-kit", "push"]
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              value: {{ .Values.db.path | quote }}
            - name: INFERENCE_PROVIDER_URL
              value: {{ .Values.inference.providerUrl | quote }}
            - name: SUMMARIZATION_MODEL
              value: {{ .Values.inference.summarizationModel | quote }}
            - name: INFERENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.fullname" . }}-secrets
                  key: INFERENCE_API_KEY
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "api.fullname" . }}-data
