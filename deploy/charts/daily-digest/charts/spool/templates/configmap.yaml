apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spool.fullname" . }}-config
  labels:
    {{- include "spool.labels" . | nindent 4 }}
data:
  INFERENCE_PROVIDER_URL: {{ .Values.config.inference.providerUrl | quote }}
  WHISPER_MODEL: {{ .Values.config.inference.whisperModel | quote }}
  SUMMARIZATION_MODEL: {{ .Values.config.inference.summarizationModel | quote }}
  DIGEST_API_URL: {{ .Values.config.digestApiUrl | quote }}
