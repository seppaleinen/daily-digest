apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spool.fullname" . }}
  labels:
    {{- include "spool.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "spool.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spool.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: spool
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: SPOOL_CONFIG_PATH
              value: /config/spool-config.yaml
            - name: WHISPER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: WHISPER_URL
            - name: SUMMARIZER_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: SUMMARIZER_URL
            - name: DIGEST_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "spool.fullname" . }}-config
                  key: DIGEST_API_URL
            - name: YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spool.fullname" . }}-secrets
                  key: YOUTUBE_API_KEY
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp/spool
      volumes:
        - name: tmp
          emptyDir: {}
