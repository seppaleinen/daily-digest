apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spool.fullname" . }}
  labels:
    {{- include "spool.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "spool.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spool.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: spool
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp/spool
      volumes:
        - name: tmp
          emptyDir: {}
