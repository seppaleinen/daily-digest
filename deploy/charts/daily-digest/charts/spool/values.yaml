image:
  repository: spool-image
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  host: spool.daily-digest.local
  entryPoints:
    - websecure
  middlewares:
    - name: authentik-auth

config:
  whisperUrl: "http://whisper-service.default.svc.cluster.local"
  summarizerUrl: "http://summarizer-service.default.svc.cluster.local"
  digestApiUrl: "http://digest-api.default.svc.cluster.local"

secrets:
  youtubeApiKey: ""

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
