apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: daily-digest-ingress
  namespace: daily-digest
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`digest.example.com`) || PathPrefix(`/api/digest`)
      kind: Rule
      services:
        - name: daily-digest-api
          port: 3000
