name: Build and Push Spool

on:
  push:
    branches:
      - main
    paths:
      - 'apps/spool/**'
      - 'deploy/helm/spool/**'
      - '.github/workflows/helm-push.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/spool
          file: apps/spool/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/daily-digest-spool:latest

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Package and Push Helm Chart
        run: |
          helm package deploy/helm/spool \
            --version 0.1.0 \
            --api-version 3 \
            --destination .
          helm push spool-0.1.0.tgz oci://ghcr.io/${{ github.repository_owner }}
