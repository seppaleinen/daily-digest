name: Full Stack Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'deploy/charts/**'
      - '.github/workflows/deploy-full-stack.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      - name: Helm Lint Umbrella Chart
        run: helm lint deploy/charts/daily-digest
      - name: Helm Lint Standalone Spool Chart
        run: helm lint deploy/helm/spool

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, spool, reader]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrations image (API only)
        if: matrix.service == 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-charts:
    needs: [lint-charts, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Push Umbrella Chart
        run: |
          CHART_VERSION="0.1.0-${GITHUB_SHA::7}"
          helm package deploy/charts/daily-digest \
            --version "${CHART_VERSION}" \
            --api-version 3 \
            --destination .
          helm push daily-digest-${CHART_VERSION}.tgz oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/charts
