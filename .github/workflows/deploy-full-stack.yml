name: Full Stack Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'deploy/charts/**'
      - '.github/workflows/deploy-full-stack.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, spool, reader]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/daily-digest-${{ matrix.service }}:latest


  lint-charts:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      - name: Helm Lint
        run: helm lint deploy/charts/daily-digest

  deploy-charts:
    needs: lint-charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Push Umbrella Chart
        run: |
          helm package deploy/charts/daily-digest \
            --version 0.1.0 \
            --api-version 3 \
            --destination .
          helm push daily-digest-0.1.0.tgz oci://ghcr.io/${{ github.repository_owner }}
