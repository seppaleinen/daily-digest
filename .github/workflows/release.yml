name: Release

on:
  # Only run after CI passes on main — never release a broken build.
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only one release job runs at a time — prevents race conditions on version tags
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Guard: skip if the triggering CI run didn't succeed ───────────────────
  ci-gate:
    name: CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI is green — proceeding with release"

  # ── Bump semantic version ──────────────────────────────────────────────────
  version:
    name: Bump version
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      previous_tag: ${{ steps.tag.outputs.previous_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Reads the conventional commit messages and decides the version bump:
      #   feat: …          → minor (1.x.0)
      #   fix: …           → patch (1.0.x)
      #   BREAKING CHANGE  → major (x.0.0)
      #   chore|docs|…     → patch (default fallback)
      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          custom_release_rules: "feat:minor,fix:patch,BREAKING CHANGE:major"
          tag_prefix: "v"
          release_branches: main

  # ── Build Docker images per platform (native runners) ──────────────────
  docker-build:
    name: Build (${{ matrix.platform }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            suffix: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=sha,format=short

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_tag }}-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrations image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:${{ needs.version.outputs.new_tag }}-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:${{ github.sha }}-${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Merge platform-specific images into multi-arch manifests ──────────────
  docker-merge:
    name: Merge multi-arch manifests
    needs: [version, docker-build]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      TAG: ${{ needs.version.outputs.new_tag }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          set -euo pipefail

          # ── Runner image tags ──
          docker buildx imagetools create \
            -t $REGISTRY/$IMAGE_NAME:latest \
            -t $REGISTRY/$IMAGE_NAME:$TAG \
            -t $REGISTRY/$IMAGE_NAME:${TAG#v} \
            -t $REGISTRY/$IMAGE_NAME:sha-${{ github.sha }} \
            $REGISTRY/$IMAGE_NAME:latest-amd64 \
            $REGISTRY/$IMAGE_NAME:latest-arm64

          # ── Migrations image tags ──
          docker buildx imagetools create \
            -t $REGISTRY/$IMAGE_NAME-migrate:latest \
            -t $REGISTRY/$IMAGE_NAME-migrate:$TAG \
            -t $REGISTRY/$IMAGE_NAME-migrate:${TAG#v} \
            -t $REGISTRY/$IMAGE_NAME-migrate:sha-${{ github.sha }} \
            $REGISTRY/$IMAGE_NAME-migrate:latest-amd64 \
            $REGISTRY/$IMAGE_NAME-migrate:latest-arm64

      - name: Image digests
        run: |
          echo "Runner image:    $REGISTRY/$IMAGE_NAME:$TAG"
          echo "Migrations image: $REGISTRY/$IMAGE_NAME-migrate:$TAG"

  # ── Create GitHub Release with auto-generated changelog ───────────────────
  github-release:
    name: Create GitHub Release
    needs: [version, docker-merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          prerelease: false
