name: Release

on:
  # Only run after CI passes on main — never release a broken build.
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Guard: skip if the triggering CI run didn't succeed ───────────────────
  ci-gate:
    name: CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI is green — proceeding with release"

  # ── Bump semantic version ──────────────────────────────────────────────────
  version:
    name: Bump version
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      previous_tag: ${{ steps.tag.outputs.previous_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          custom_release_rules: "feat:minor,fix:patch,BREAKING CHANGE:major"
          tag_prefix: "v"
          release_branches: main

  # ── Lint Helm charts ─────────────────────────────────────────────────────
  lint-charts:
    name: Lint Helm charts
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Lint Umbrella Chart
        run: helm lint deploy/charts/daily-digest

      - name: Lint Standalone Spool Chart
        run: helm lint deploy/helm/spool

  # ── Build Docker images per service per platform ────────────────────────
  docker-build:
    name: Build ${{ matrix.service }} (${{ matrix.platform }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        service: [api, spool, reader]
        include:
          - platform: linux/amd64
            suffix: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            suffix: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          flavor: |
            latest=false
          tags: |
            type=sha,format=short

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          target: runner
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ needs.version.outputs.new_tag }}-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}-${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrations image (API only)
        if: matrix.service == 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrator
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:${{ needs.version.outputs.new_tag }}-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:${{ github.sha }}-${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Merge platform-specific images into multi-arch manifests ──────────────
  docker-merge:
    name: Merge multi-arch manifests
    needs: [version, docker-build]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    env:
      TAG: ${{ needs.version.outputs.new_tag }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          set -euo pipefail
          for service in api spool reader; do
            docker buildx imagetools create \
              -t $REGISTRY/$IMAGE_NAME-$service:latest \
              -t $REGISTRY/$IMAGE_NAME-$service:$TAG \
              -t $REGISTRY/$IMAGE_NAME-$service:${TAG#v} \
              -t $REGISTRY/$IMAGE_NAME-$service:sha-${{ github.sha }} \
              $REGISTRY/$IMAGE_NAME-$service:latest-amd64 \
              $REGISTRY/$IMAGE_NAME-$service:latest-arm64
          done

      - name: Create multi-arch manifests for migrations image
        run: |
          docker buildx imagetools create \
            -t $REGISTRY/$IMAGE_NAME-migrate:latest \
            -t $REGISTRY/$IMAGE_NAME-migrate:$TAG \
            -t $REGISTRY/$IMAGE_NAME-migrate:${TAG#v} \
            -t $REGISTRY/$IMAGE_NAME-migrate:sha-${{ github.sha }} \
            $REGISTRY/$IMAGE_NAME-migrate:latest-amd64 \
            $REGISTRY/$IMAGE_NAME-migrate:latest-arm64

      - name: Image digests
        run: |
          echo "API:      $REGISTRY/$IMAGE_NAME-api:$TAG"
          echo "Spool:    $REGISTRY/$IMAGE_NAME-spool:$TAG"
          echo "Reader:   $REGISTRY/$IMAGE_NAME-reader:$TAG"
          echo "Migrate:  $REGISTRY/$IMAGE_NAME-migrate:$TAG"

  # ── Package and push Helm charts to OCI ──────────────────────────────────
  push-charts:
    name: Push Helm charts
    needs: [lint-charts, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and Push Umbrella Chart
        run: |
          CHART_VERSION="${{ needs.version.outputs.new_tag }}-${GITHUB_SHA::7}"
          helm package deploy/charts/daily-digest \
            --version "${CHART_VERSION}" \
            --destination .
          helm push daily-digest-${CHART_VERSION}.tgz oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/charts

      - name: Extract spool chart for separate publishing (optional)
        run: |
          CHART_VERSION="${{ needs.version.outputs.new_tag }}-${GITHUB_SHA::7}"
          helm package deploy/helm/spool \
            --version "${CHART_VERSION}" \
            --destination .
          helm push spool-${CHART_VERSION}.tgz oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/charts

  # ── Create GitHub Release with auto-generated changelog ───────────────────
  github-release:
    name: Create GitHub Release
    needs: [version, docker-merge, push-charts]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          prerelease: false
